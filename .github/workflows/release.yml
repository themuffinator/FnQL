name: release

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FNQL_LINUX_GLIBC_MAX: "2.31"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.meta.outputs.build_number }}
      build_date: ${{ steps.meta.outputs.build_date }}
      base_version: ${{ steps.meta.outputs.base_version }}
      version_string: ${{ steps.meta.outputs.version_string }}
      head_commit: ${{ steps.meta.outputs.head_commit }}
      head_commit_short: ${{ steps.meta.outputs.head_commit_short }}
      previous_release_commit: ${{ steps.meta.outputs.previous_release_commit }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Resolve release metadata
        id: meta
        run: |
          python scripts/manual_release.py github-output --build-date "$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Summarize
        run: |
          echo "Release build metadata resolved"
          echo "Base version: ${{ steps.meta.outputs.base_version }}"
          echo "Build version: ${{ steps.meta.outputs.version_string }}"
          echo "Head commit: ${{ steps.meta.outputs.head_commit }}"
          echo "Previous release commit: ${{ steps.meta.outputs.previous_release_commit }}"

  windows-msys32:
    needs: [prepare]
    name: Build Windows-MSYS2 x86
    runs-on: windows-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: git
          pacboy: >-
            toolchain:p
            meson:p
            ninja:p

      - name: Stamp release build version
        shell: msys2 {0}
        run: python scripts/manual_release.py stamp-version --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Build
        shell: msys2 {0}
        run: |
          mkdir -p bin
          meson setup meson/build-x86 \
            --buildtype=release \
            --wrap-mode=forcefallback \
            --prefix "$PWD/bin" \
            -Dc_link_args=-static \
            -Dcpp_link_args=-static \
            -Dcurl=enabled \
            -Dcurl-dlopen=false \
            -Dsdl=disabled \
            -Drenderer-dlopen=true \
            -Drenderers=glx,vk,rtx \
            -Drenderer-default=glx \
            -Daudio-tests=false \
            -Dglx-tests=false \
            -Dzlib:default_library=static \
            -Dlibjpeg-turbo:simd=disabled
          meson compile -C meson/build-x86
          meson install -C meson/build-x86 --no-rebuild --skip-subprojects

      - name: Test retail map-pool serialization
        shell: msys2 {0}
        run: meson test -C meson/build-x86 fnql_factory_rotation --print-errorlogs

      - name: Stage pinned Steam provider
        shell: msys2 {0}
        run: python scripts/fetch_steam_provider.py --output bin/fnql_steam.dll

      - name: Check Windows runtime dependencies
        shell: msys2 {0}
        run: python scripts/check_windows_runtime_deps.py --require-pe bin

      - name: Verify release layout
        shell: msys2 {0}
        run: python scripts/verify_release_layout.py bin/FnQL-pkg.fnz

      - uses: actions/upload-artifact@v7
        with:
          name: windows-mingw-x86
          path: bin
          if-no-files-found: error
          retention-days: 5

  windows-msvc:
    needs: [prepare]
    name: Build Windows-MSVC x86
    runs-on: windows-2022
    steps:
      - uses: microsoft/setup-msbuild@v3

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Stamp release build version
        run: python scripts/manual_release.py stamp-version --build-number ${{ needs.prepare.outputs.build_number }}

      - name: Install Meson
        run: python -m pip install meson ninja

      - name: Build
        shell: cmd
        run: |
          if not exist bin mkdir bin

          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSINSTALL=%%i
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -arch=x86 -host_arch=x64 || exit /b
          meson setup meson\build-x86 --buildtype=release --wrap-mode=forcefallback --prefix "%CD%\bin" -Db_vscrt=static_from_buildtype -Dzlib:default_library=static -Dcurl=enabled -Dcurl-dlopen=false -Dsdl=disabled -Drenderer-dlopen=true -Drenderers=glx,vk,rtx -Drenderer-default=glx -Daudio-tests=false -Dglx-tests=false -Dlibjpeg-turbo:simd=disabled || exit /b
          meson compile -C meson\build-x86 || exit /b
          meson install -C meson\build-x86 --no-rebuild --skip-subprojects || exit /b

      - name: Test retail map-pool serialization
        run: meson test -C meson\build-x86 fnql_factory_rotation --print-errorlogs

      - name: Stage pinned Steam provider
        run: python scripts/fetch_steam_provider.py --output bin/fnql_steam.dll

      - name: Check Windows runtime dependencies
        run: python scripts/check_windows_runtime_deps.py --require-pe bin

      - name: Verify release layout
        run: python scripts/verify_release_layout.py bin/FnQL-pkg.fnz

      - uses: actions/upload-artifact@v7
        with:
          name: windows-msvc-x86
          path: bin
          if-no-files-found: error
          retention-days: 5

  source-validation:
    needs: [prepare]
    name: Release source validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check release and WebUI source contracts
        run: |
          python tests/release_packaging_tests.py
          python tests/macos_bundle_tests.py
          python tests/macos_support_source_tests.py
          python tests/stock_ql_sidecar_tests.py
          python tests/webui_wiring_tests.py
          python tests/webui_backend_source_tests.py
          python tests/launch_and_transition_source_tests.py
          python tests/windowed_mouse_source_tests.py
          python tests/client_cvar_compat_source_tests.py
          python tests/steam_provider_source_tests.py

  macos:
    needs: [prepare]
    name: Build macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact_arch: x86_64
            host_arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            artifact_arch: aarch64
            host_arch: arm64
            runner: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          test "$(uname -m)" = "${{ matrix.host_arch }}"
          python3 -m pip install meson==1.9.1 ninja

      - name: Stamp release build version
        run: python3 scripts/manual_release.py stamp-version --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: Configure, build, and test
        run: |
          meson setup .tmp/meson-macos-${{ matrix.arch }} \
            --buildtype=release \
            --wrap-mode=forcefallback \
            --prefix "$PWD/.tmp/macos-install-${{ matrix.arch }}" \
            -Ddefault_library=static \
            -Dcurl=enabled \
            -Dcurl-dlopen=false \
            -Dsdl=enabled \
            -Drenderer-dlopen=true \
            -Drenderers=glx,vk,rtx \
            -Drenderer-default=glx \
            -Daudio-tests=true \
            -Dglx-tests=true \
            -Dzlib:default_library=static
          meson compile -C .tmp/meson-macos-${{ matrix.arch }}
          meson test -C .tmp/meson-macos-${{ matrix.arch }} --print-errorlogs
          meson install -C .tmp/meson-macos-${{ matrix.arch }} --no-rebuild --skip-subprojects

      - name: Stage without project signing
        run: |
          python3 scripts/macos_bundle.py \
            --input "${{ matrix.arch }}=$PWD/.tmp/macos-install-${{ matrix.arch }}" \
            --output bin

      - name: Verify app metadata, architecture, and portable dependencies
        run: |
          set -euo pipefail
          plutil -lint bin/FnQL.app/Contents/Info.plist
          python3 scripts/verify_release_layout.py bin/FnQL.app/Contents/MacOS/FnQL-pkg.fnz
          while IFS= read -r -d '' candidate; do
            if file "$candidate" | grep -q 'Mach-O'; then
              architectures="$(lipo -archs "$candidate")"
              if test "$architectures" != "${{ matrix.host_arch }}"; then
                echo "Unexpected architecture '$architectures' in $candidate" >&2
                exit 1
              fi
              dependencies="$(otool -L "$candidate")"
              printf '%s\n' "$dependencies"
              if printf '%s\n' "$dependencies" | grep -E '(/opt/homebrew|/usr/local/(Cellar|opt)|/opt/local|/\.tmp/)'; then
                echo "Non-portable macOS dependency in $candidate" >&2
                exit 1
              fi
            fi
          done < <(find bin -type f -print0)

      - name: Complete and validate macOS release stage
        run: |
          set -euo pipefail
          python3 scripts/generate_docs.py
          python3 - <<'PY'
          from pathlib import Path
          from scripts import release

          stage = Path("bin")
          release.copy_docs(stage)
          release.build_fnql_webpak(stage)
          release.build_root_archive(stage)
          release.validate_stage_tree(
              stage,
              artifact_name="macos-${{ matrix.artifact_arch }}",
          )
          PY

      - name: Preserve unsigned macOS payload metadata
        run: |
          rm -f macos-payload.zip
          ditto -c -k --norsrc bin macos-payload.zip
          python3 - <<'PY'
          from pathlib import Path
          from scripts import release

          release.validate_release_archive_contents(
              Path("macos-payload.zip"),
              artifact_name="macos-${{ matrix.artifact_arch }}",
              require_macos_signature=False,
          )
          PY

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'workflow_dispatch'
        with:
          name: macos-${{ matrix.artifact_arch }}
          path: macos-payload.zip
          if-no-files-found: error
          retention-days: 5

      - uses: actions/upload-artifact@v7
        if: github.event_name == 'workflow_dispatch'
        with:
          name: unsigned-apple-${{ matrix.artifact_arch }}
          path: macos-payload.zip
          if-no-files-found: error
          retention-days: 1

  macos-release-sign:
    if: github.event_name == 'workflow_dispatch'
    needs: [macos]
    name: Sign macOS ${{ matrix.arch }} release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact_arch: x86_64
            host_arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            artifact_arch: aarch64
            host_arch: arm64
            runner: macos-15
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: unsigned-apple-${{ matrix.artifact_arch }}
          path: unsigned

      - name: Extract and validate unsigned payload
        run: |
          set -euo pipefail
          test "$(uname -m)" = "${{ matrix.host_arch }}"
          python3 - <<'PY'
          import shutil
          import stat
          import zipfile
          from pathlib import Path, PurePosixPath

          destination_root = Path("bin").resolve()
          destination_root.mkdir()
          seen = set()
          total_size = 0
          with zipfile.ZipFile("unsigned/macos-payload.zip") as archive:
              infos = archive.infolist()
              if len(infos) > 10000:
                  raise SystemExit("Unsigned macOS payload has too many entries")
              for info in infos:
                  name = PurePosixPath(info.filename)
                  if (
                      not info.filename
                      or info.filename.startswith(("/", "\\"))
                      or "\\" in info.filename
                      or any(part in ("", ".", "..") for part in name.parts)
                      or any(part == "__MACOSX" or part.startswith("._") for part in name.parts)
                  ):
                      raise SystemExit(f"Unsafe unsigned payload path: {info.filename!r}")
                  folded = name.as_posix().casefold()
                  if folded in seen:
                      raise SystemExit(f"Duplicate unsigned payload path: {info.filename!r}")
                  seen.add(folded)
                  mode = (info.external_attr >> 16) & 0xFFFF
                  file_type = stat.S_IFMT(mode)
                  if file_type == stat.S_IFLNK or file_type not in (0, stat.S_IFREG, stat.S_IFDIR):
                      raise SystemExit(f"Unsupported unsigned payload entry: {info.filename!r}")
                  target = (destination_root / Path(*name.parts)).resolve()
                  if destination_root not in target.parents and target != destination_root:
                      raise SystemExit(f"Escaping unsigned payload path: {info.filename!r}")
                  if info.is_dir() or stat.S_ISDIR(mode):
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  total_size += info.file_size
                  if info.file_size > 512 * 1024 * 1024 or total_size > 2 * 1024 * 1024 * 1024:
                      raise SystemExit("Unsigned macOS payload exceeds the extraction limit")
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(info) as source, target.open("xb") as output:
                      shutil.copyfileobj(source, output)
                  target.chmod((mode & 0o777) or 0o644)
          PY
          test -f bin/FnQL.app/Contents/Info.plist
          test -f bin/FnQL.app/Contents/MacOS/FnQL
          test -f bin/fnql.ded
          test -f bin/fnql-audiozonesc
          test ! -e bin/FnQL.app/Contents/_CodeSignature
          if find bin -type l | grep -q .; then
            echo "Unsigned macOS payload contains a symbolic link" >&2
            exit 1
          fi
          plutil -lint bin/FnQL.app/Contents/Info.plist
          while IFS= read -r -d '' candidate; do
            if file "$candidate" | grep -q 'Mach-O'; then
              architectures="$(lipo -archs "$candidate")"
              if test "$architectures" != "${{ matrix.host_arch }}"; then
                echo "Unexpected architecture '$architectures' in $candidate" >&2
                exit 1
              fi
              dependencies="$(otool -L "$candidate")"
              if printf '%s\n' "$dependencies" | grep -E '(/opt/homebrew|/usr/local/(Cellar|opt)|/opt/local|/\.tmp/)'; then
                echo "Non-portable macOS dependency in $candidate" >&2
                exit 1
              fi
            fi
          done < <(find bin -type f -print0)

      - name: Configure isolated Developer ID credentials
        env:
          FNQL_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          FNQL_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          FNQL_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          FNQL_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          FNQL_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          missing=()
          test -n "$FNQL_P12_BASE64" || missing+=(MACOS_DEVELOPER_ID_P12_BASE64)
          test -n "$FNQL_P12_PASSWORD" || missing+=(MACOS_DEVELOPER_ID_P12_PASSWORD)
          test -n "$FNQL_NOTARY_KEY_BASE64" || missing+=(MACOS_NOTARY_KEY_BASE64)
          test -n "$FNQL_NOTARY_KEY_ID" || missing+=(MACOS_NOTARY_KEY_ID)
          test -n "$FNQL_NOTARY_ISSUER_ID" || missing+=(MACOS_NOTARY_ISSUER_ID)
          if (( ${#missing[@]} )); then
            printf 'Manual macOS releases require repository secret %s\n' "${missing[@]}" >&2
            exit 1
          fi

          signing_root="$RUNNER_TEMP/fnql-signing-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}"
          keychain_path="$signing_root.keychain-db"
          certificate_path="$signing_root.p12"
          notary_key_path="$signing_root.p8"
          entitlements_path="$signing_root.entitlements.plist"
          notary_profile="fnql-notary-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}"
          login_keychain="$(security default-keychain -d user | tr -d '"')"
          keychain_password="$(uuidgen)$(uuidgen)"
          echo "::add-mask::$keychain_password"

          {
            echo "FNQL_MACOS_KEYCHAIN_PATH=$keychain_path"
            echo "FNQL_MACOS_CERTIFICATE_PATH=$certificate_path"
            echo "FNQL_MACOS_NOTARY_KEY_PATH=$notary_key_path"
            echo "FNQL_MACOS_ENTITLEMENTS_PATH=$entitlements_path"
            echo "FNQL_MACOS_NOTARY_PROFILE=$notary_profile"
            echo "FNQL_MACOS_LOGIN_KEYCHAIN=$login_keychain"
          } >> "$GITHUB_ENV"

          printf '%s' "$FNQL_P12_BASE64" | base64 -D > "$certificate_path"
          printf '%s' "$FNQL_NOTARY_KEY_BASE64" | base64 -D > "$notary_key_path"
          chmod 600 "$certificate_path" "$notary_key_path"
          plutil -create xml1 -o "$entitlements_path"
          plutil -insert com.apple.security.cs.allow-unsigned-executable-memory -bool true "$entitlements_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" "$login_keychain"
          security default-keychain -d user -s "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$FNQL_P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          signing_identity="$(security find-identity -v -p codesigning "$keychain_path" | awk '/Developer ID Application:/ {print $2; exit}')"
          if test -z "$signing_identity"; then
            echo "Imported certificate does not contain a Developer ID Application identity" >&2
            exit 1
          fi
          echo "FNQL_MACOS_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"

          xcrun notarytool store-credentials "$notary_profile" \
            --key "$notary_key_path" \
            --key-id "$FNQL_NOTARY_KEY_ID" \
            --issuer "$FNQL_NOTARY_ISSUER_ID" \
            --keychain "$keychain_path"
          rm -f -- "$certificate_path" "$notary_key_path"

      - name: Developer ID sign, notarize, and staple
        run: |
          set -euo pipefail
          common=(--force --sign "$FNQL_MACOS_SIGNING_IDENTITY" --options runtime --timestamp)
          for candidate in bin/FnQL.app/Contents/MacOS/*.dylib; do
            codesign "${common[@]}" "$candidate"
          done
          codesign "${common[@]}" --entitlements "$FNQL_MACOS_ENTITLEMENTS_PATH" bin/fnql.ded
          codesign "${common[@]}" bin/fnql-audiozonesc
          codesign "${common[@]}" --entitlements "$FNQL_MACOS_ENTITLEMENTS_PATH" bin/FnQL.app

          codesign --verify --deep --strict --verbose=2 bin/FnQL.app
          codesign --verify --strict --verbose=2 bin/fnql.ded
          codesign --verify --strict --verbose=2 bin/fnql-audiozonesc
          for candidate in bin/FnQL.app bin/fnql.ded; do
            codesign --display --entitlements - --xml "$candidate" \
              | plutil -extract com.apple.security.cs.allow-unsigned-executable-memory raw - \
              | grep -qx true
          done

          ditto -c -k --sequesterRsrc --keepParent bin "$RUNNER_TEMP/fnql-notary.zip"
          xcrun notarytool submit "$RUNNER_TEMP/fnql-notary.zip" \
            --keychain-profile "$FNQL_MACOS_NOTARY_PROFILE" \
            --keychain "$FNQL_MACOS_KEYCHAIN_PATH" \
            --wait
          xcrun stapler staple bin/FnQL.app
          xcrun stapler validate bin/FnQL.app
          codesign --verify --deep --strict --verbose=2 bin/FnQL.app
          spctl --assess --type execute --verbose=2 bin/FnQL.app
          rm -f macos-payload.zip
          ditto -c -k --sequesterRsrc bin macos-payload.zip

      - name: Remove Developer ID and notarization credentials
        if: always()
        run: |
          set +e
          if test -n "${FNQL_MACOS_LOGIN_KEYCHAIN:-}"; then
            security list-keychains -d user -s "$FNQL_MACOS_LOGIN_KEYCHAIN"
            security default-keychain -d user -s "$FNQL_MACOS_LOGIN_KEYCHAIN"
          fi
          if test -n "${FNQL_MACOS_KEYCHAIN_PATH:-}"; then
            security delete-keychain "$FNQL_MACOS_KEYCHAIN_PATH"
            rm -f -- "$FNQL_MACOS_KEYCHAIN_PATH"
          fi
          test -z "${FNQL_MACOS_CERTIFICATE_PATH:-}" || rm -f -- "$FNQL_MACOS_CERTIFICATE_PATH"
          test -z "${FNQL_MACOS_NOTARY_KEY_PATH:-}" || rm -f -- "$FNQL_MACOS_NOTARY_KEY_PATH"
          test -z "${FNQL_MACOS_ENTITLEMENTS_PATH:-}" || rm -f -- "$FNQL_MACOS_ENTITLEMENTS_PATH"
          rm -f -- "$RUNNER_TEMP/fnql-notary.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-${{ matrix.artifact_arch }}
          path: macos-payload.zip
          if-no-files-found: error
          retention-days: 5

  ubuntu-x86:
    needs: [prepare]
    name: Build Ubuntu x86
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:20.04
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install tools
        run: |
          dpkg --add-architecture i386
          apt-get -qq update
          apt-get -y install git make python3 python3-pip binutils gcc-multilib g++-multilib libcurl4-openssl-dev:i386 libjpeg-dev:i386 libogg-dev:i386 libvorbis-dev:i386 mesa-common-dev:i386 libxxf86dga-dev:i386 libxrandr-dev:i386 libxxf86vm-dev:i386 libasound2-dev:i386 libopenal-dev:i386
          python3 -m pip install meson==1.9.1

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Fetch pinned FontStash source
        run: meson subprojects download fontstash

      - name: Stamp release build version
        run: python3 scripts/manual_release.py stamp-version --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: Build
        run: |
          make install -j$(nproc) ARCH=x86 COMPILE_ARCH=x86 CC=gcc DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=1 USE_GLX=1 USE_VK=1 USE_RTX=1

      - name: Check glibc baseline
        run: python3 scripts/check_elf_glibc.py --max-glibc "$FNQL_LINUX_GLIBC_MAX" --require-elf bin

      - name: Verify release layout
        run: python3 scripts/verify_release_layout.py bin/FnQL-pkg.fnz

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86
          path: bin
          if-no-files-found: error
          retention-days: 5

  push-build-validation:
    if: github.event_name == 'push' && always()
    needs: [prepare, windows-msys32, windows-msvc, source-validation, macos, ubuntu-x86]
    runs-on: ubuntu-latest
    steps:
      - name: Check platform build results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] != "success"
          }

          if failed:
              for name, result in failed.items():
                  print(f"{name}: {result}")
              sys.exit(1)

          print("All push build validations passed.")
          PY

  publish:
    if: github.event_name == 'workflow_dispatch'
    needs: [prepare, windows-msys32, windows-msvc, source-validation, macos-release-sign, ubuntu-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
      pull-requests: read
    env:
      HAS_COPILOT_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Stamp release build version
        run: python scripts/manual_release.py stamp-version --build-number "${{ needs.prepare.outputs.build_number }}"

      - name: Download MinGW artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-mingw-x86
          path: artifacts/windows-mingw-x86

      - name: Download MSVC artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-msvc-x86
          path: artifacts/windows-msvc-x86

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-x86
          path: artifacts/linux-x86

      - name: Download Intel macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-x86_64
          path: artifacts/macos-x86_64

      - name: Download Apple Silicon macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-aarch64
          path: artifacts/macos-aarch64

      - name: Resolve release version metadata
        run: |
          python scripts/version.py github-env --channel manual --build-number "${{ needs.prepare.outputs.build_number }}" --build-date "${{ needs.prepare.outputs.build_date }}" --commit "${{ needs.prepare.outputs.head_commit }}" >> "$GITHUB_ENV"

      - name: Package release archives
        run: |
          python scripts/release.py --channel manual --artifact-root artifacts --build-number "${{ needs.prepare.outputs.build_number }}" --build-date "${{ needs.prepare.outputs.build_date }}" --commit "${{ needs.prepare.outputs.head_commit }}"

      - name: Build Copilot changelog cleanup
        id: copilot_notes
        if: ${{ env.HAS_COPILOT_TOKEN == 'true' && needs.prepare.outputs.previous_release_commit != '' }}
        uses: github/copilot-release-notes@v1.0.1
        with:
          base-ref: ${{ needs.prepare.outputs.previous_release_commit }}
          head-ref: ${{ needs.prepare.outputs.head_commit }}
          instructions: .github/release-notes-instructions.md
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}

      - name: Save Copilot highlights
        if: ${{ steps.copilot_notes.outputs.release-notes != '' }}
        env:
          COPILOT_RELEASE_NOTES: ${{ steps.copilot_notes.outputs.release-notes }}
        run: |
          mkdir -p .tmp
          printf '%s\n' "$COPILOT_RELEASE_NOTES" > .tmp/copilot-release-notes.md

      - name: Build release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FROM_ARGS=()
          if [ -n "${{ needs.prepare.outputs.previous_release_commit }}" ]; then
            FROM_ARGS+=(--from-commit "${{ needs.prepare.outputs.previous_release_commit }}")
          fi
          HIGHLIGHTS_ARGS=()
          if [ -s .tmp/copilot-release-notes.md ]; then
            HIGHLIGHTS_ARGS+=(--highlights-file .tmp/copilot-release-notes.md)
          fi
          python scripts/manual_release.py release-notes \
            --build-number "${{ needs.prepare.outputs.build_number }}" \
            --build-date "${{ needs.prepare.outputs.build_date }}" \
            --to-commit "${{ needs.prepare.outputs.head_commit }}" \
            "${FROM_ARGS[@]}" \
            "${HIGHLIGHTS_ARGS[@]}" \
            --output .tmp/release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${FNQL_RELEASE_TAG}" \
            .install/packages/*.zip \
            .install/packages/*.tar.gz \
            .install/release-manifest.json \
            .install/SHA256SUMS.txt \
            --target "${{ needs.prepare.outputs.head_commit }}" \
            --title "${FNQL_RELEASE_TITLE}" \
            --notes-file .tmp/release-notes.md

      - name: Clear pending changelog
        if: ${{ github.ref_type == 'branch' }}
        run: |
          python scripts/changelog.py clear-unreleased
          if git diff --quiet -- docs/fnql/CHANGELOG.md; then
            echo "Pending changelog already clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/fnql/CHANGELOG.md
          git commit -m "Reset pending changelog after release"
          git push origin "HEAD:${GITHUB_REF_NAME}"
