name: Linux verification

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/linux-verification.yml'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'meson.build'
      - 'meson_options.txt'
      - 'misc/meson/**'
      - 'code/**'
      - 'pkg/**'
      - 'scripts/**'
      - 'subprojects/**'
      - 'tests/**'
      - 'version/**'
  pull_request:
    paths:
      - '.github/workflows/linux-verification.yml'
      - 'CMakeLists.txt'
      - 'Makefile'
      - 'meson.build'
      - 'meson_options.txt'
      - 'misc/meson/**'
      - 'code/**'
      - 'pkg/**'
      - 'scripts/**'
      - 'subprojects/**'
      - 'tests/**'
      - 'version/**'
  workflow_dispatch:

concurrency:
  group: linux-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make-server-i686:
    name: Make i686 dedicated server
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install i686 compiler support
        run: |
          sudo apt-get -qq update
          sudo apt-get install -y file gcc-multilib g++-multilib make python3

      - name: Build retail-width Linux dedicated server
        run: |
          make -j"$(nproc)" release \
            ARCH=x86 \
            COMPILE_ARCH=x86 \
            BUILD_CLIENT=0 \
            BUILD_SERVER=1 \
            USE_CURL=0 \
            USE_GLX=0 \
            USE_OGG_VORBIS=0 \
            USE_OPENGL_API=0 \
            USE_RENDERER_DLOPEN=0 \
            USE_RTX=0 \
            USE_SDL=0 \
            USE_VK=0 \
            USE_VULKAN_API=0
          test -x build/release-linux-x86/fnql.ded
          file build/release-linux-x86/fnql.ded | grep -F 'ELF 32-bit LSB'
          file build/release-linux-x86/fnql.ded | grep -F 'Intel 80386'

  meson-x86:
    name: Meson i686 server, renderers, and tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install i686 Meson build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get -qq update
          sudo apt-get install -y \
            file \
            gcc-multilib \
            g++-multilib \
            glslang-tools \
            libc6-dev-i386 \
            libgl-dev:i386 \
            libx11-dev:i386 \
            libxext-dev:i386 \
            libxrandr-dev:i386 \
            libxxf86dga-dev:i386 \
            libxxf86vm-dev:i386 \
            linux-libc-dev:i386 \
            mesa-common-dev:i386 \
            meson \
            ninja-build \
            pkg-config \
            python3

      - name: Build dependency-isolated i686 dedicated server
        run: |
          meson setup .tmp/meson-linux-server-only \
            --cross-file misc/meson/linux-x86.ini \
            --buildtype=debugoptimized \
            --wrap-mode=nofallback \
            -Daudio-tests=false \
            -Dbuild-client=false \
            -Dbuild-server=true \
            -Dcurl=disabled \
            -Dglx-tests=false \
            -Dogg-vorbis=false \
            -Dsdl=disabled
          meson compile -C .tmp/meson-linux-server-only fnql.ded
          file .tmp/meson-linux-server-only/fnql.ded | grep -F 'ELF 32-bit LSB'
          file .tmp/meson-linux-server-only/fnql.ded | grep -F 'Intel 80386'

      - name: Build i686 renderer modules
        run: |
          meson setup .tmp/meson-linux-renderers \
            --cross-file misc/meson/linux-x86.ini \
            --buildtype=debugoptimized \
            -Daudio-tests=false \
            -Dbuild-client=true \
            -Dbuild-server=false \
            -Dcurl=disabled \
            -Dglx-tests=false \
            -Dogg-vorbis=false \
            -Drenderer-dlopen=true \
            -Drenderer-default=glx \
            -Drenderers=glx,vk,rtx \
            -Dsdl=disabled
          for renderer in glx vk rtx; do
            artifact=".tmp/meson-linux-renderers/fnql_${renderer}_x86.so"
            meson compile -C .tmp/meson-linux-renderers "fnql_${renderer}_x86"
            file "$artifact" | grep -F 'ELF 32-bit LSB'
            file "$artifact" | grep -F 'Intel 80386'
          done
